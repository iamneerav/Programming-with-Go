---
- name: Bootstrap local dev tools in WSL
  hosts: localhost
  connection: local
  become: true

  vars:
    apt_packages:
      - git
      - curl
      - unzip
      - build-essential
      - ca-certificates
      - gnupg
      - lsb-release
      - jq
      - ripgrep
      - direnv

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base apt packages
      ansible.builtin.apt:
        name: "{{ apt_packages }}"
        state: present

    - name: Check if Go is installed
      ansible.builtin.command: go version
      register: go_version_check
      changed_when: false
      failed_when: false

    - name: Install Go when missing
      ansible.builtin.apt:
        name: golang-go
        state: present
      when: go_version_check.rc != 0

    - name: Check if GitHub CLI is installed
      ansible.builtin.command: gh --version
      register: gh_version_check
      changed_when: false
      failed_when: false

    - name: Add GitHub CLI apt key
      ansible.builtin.get_url:
        url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
        dest: /usr/share/keyrings/githubcli-archive-keyring.gpg
        mode: '0644'
      when: gh_version_check.rc != 0

    - name: Add GitHub CLI apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main"
        state: present
        filename: github-cli
      when: gh_version_check.rc != 0

    - name: Install GitHub CLI
      ansible.builtin.apt:
        name: gh
        state: present
        update_cache: true
      when: gh_version_check.rc != 0

    - name: Ensure direnv hook is in bashrc
      ansible.builtin.lineinfile:
        path: "{{ ansible_env.HOME }}/.bashrc"
        line: 'eval "$(direnv hook bash)"'
        state: present

    - name: Ensure direnv hook is in zshrc
      ansible.builtin.lineinfile:
        path: "{{ ansible_env.HOME }}/.zshrc"
        line: 'eval "$(direnv hook zsh)"'
        state: present
        create: true

    - name: Print next manual steps
      ansible.builtin.debug:
        msg:
          - "Run: exec $SHELL"
          - "Run: direnv allow (inside a repo with .envrc)"
          - "Run: gh auth login"
